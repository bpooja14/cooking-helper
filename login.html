<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#ff9966,#ff5e62);
}

/* CONTAINER */

.container{
width:850px;
max-width:95%;
background:white;
border-radius:12px;
display:flex;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* LEFT SIDE */

.left{
flex:1;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
}

.left i{
font-size:70px;
margin-bottom:20px;
}

.left h1{
margin-bottom:10px;
}

/* RIGHT SIDE */

.right{
flex:1;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

.right h2{
text-align:center;
margin-bottom:25px;
}

/* INPUT BOX */

.input-box{
position:relative;
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px 40px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.input-box i{
position:absolute;
left:12px;
top:12px;
color:#888;
}

/* REMEMBER + FORGOT */

.options{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
margin-bottom:15px;
}

.options a{
text-decoration:none;
color:#ff6b6b;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
background:#ff6b6b;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff4757;
}

/* REGISTER */

.register{
text-align:center;
margin-top:15px;
font-size:14px;
}

.register a{
color:#ff6b6b;
text-decoration:none;
}

/* ERROR MESSAGE */

.error{
color:red;
font-size:13px;
margin-top:10px;
text-align:center;
}

/* RESPONSIVE */

@media(max-width:768px){

.container{
flex-direction:column;
}

.left{
padding:30px;
}

.left i{
font-size:50px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->

<div class="left">

<i class="fa-solid fa-utensils"></i>
<h1>Cooking Helper</h1>
<p>Plan your daily meals easily</p>

</div>

<!-- RIGHT -->

<div class="right">

<h2>Login</h2>

<form onsubmit="return validateLogin()">

<div class="input-box">
<i class="fa fa-phone"></i>
<input type="text" id="mobile" placeholder="Mobile Number" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password" required>
</div>

<div class="options">

<label>
<input type="checkbox" id="remember"> Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">
<i class="fa-solid fa-right-to-bracket"></i> Login
</button>

<p class="error" id="errorMsg"></p>

</form>

<div class="register">
Don't have account?
<a href="registration.html">Register</a>
</div>

</div>

</div>

<script>

function validateLogin(){

let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;
let remember=document.getElementById("remember").checked;
let error=document.getElementById("errorMsg");

let pattern=/^[0-9]{10}$/;

if(!pattern.test(mobile)){
error.innerHTML="Enter valid 10 digit mobile number";
return false;
}

if(password.length<6){
error.innerHTML="Password must be at least 6 characters";
return false;
}

if(remember){
localStorage.setItem("userMobile",mobile);
}

alert("Login Successful");

return true;

}

</script>

</body>
</html>
