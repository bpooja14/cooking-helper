<!DOCTYPE html>
<html>
<head>
<title>Cooking Helper Home</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:#f5f5f5;
}

/* NAVBAR */

nav{
background:#ff6b6b;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

nav ul{
list-style:none;
display:flex;
}

nav ul li{
margin-left:20px;
cursor:pointer;
}

/* LANGUAGE SELECT */

select{
padding:5px;
border-radius:4px;
border:none;
}

/* HERO */

.hero{
height:380px;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1498837167922-ddd27525d352");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
padding:20px;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
margin-bottom:15px;
}

/* MAIN BUTTON */

.hero button{
padding:12px 25px;
background:#ff6b6b;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

/* LOGIN REGISTER BUTTONS */

.auth-buttons{
margin-top:20px;
display:flex;
gap:15px;
}

.auth-buttons a{
text-decoration:none;
}

.auth-buttons button{
padding:10px 22px;
border:none;
border-radius:6px;
background:#ffffff;
color:#ff6b6b;
font-weight:bold;
cursor:pointer;
}

.auth-buttons button:hover{
background:#ffe6e6;
}

/* CARD SECTION */

.section{
padding:50px 30px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:30px;
}

.card{
background:white;
width:250px;
padding:30px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card i{
font-size:40px;
color:#ff6b6b;
margin-bottom:10px;
}

.card button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#ff6b6b;
color:white;
border-radius:5px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

nav{
flex-direction:column;
align-items:flex-start;
}

nav ul{
flex-direction:column;
width:100%;
margin-top:10px;
}

nav ul li{
margin:8px 0;
}

.hero h1{
font-size:28px;
}

.cards{
flex-direction:column;
align-items:center;
}

.card{
width:90%;
}

.auth-buttons{
flex-direction:column;
}

}

</style>
</head>

<body>

<nav>

<h2><i class="fa-solid fa-utensils"></i> Cooking Helper</h2>

<ul>
<li id="homeText" data-key="home">Home</li>
<li id="menuText" data-key="menu">Weekly Menu</li>
<li id="recipeText" data-key="recipe">Recipes</li>
<li id="ingredientText" data-key="ingredient">Ingredients</li>
</ul>

<select id="language" onchange="changeLanguage()">
<option value="en">English</option>
<option value="mr">Marathi</option>
<option value="hi">Hindi</option>
</select>

</nav>

<div class="hero">

<h1 id="title" data-key="title">What Should I Cook Today?</h1>

<p id="subtitle" data-key="subtitle">Plan your daily meals easily</p>

<button id="todayBtn" data-key="todayBtn">View Today Menu</button>

<div class="auth-buttons">

<a href="login.html">
<button id="loginBtn" data-key="login">Login</button>
</a>

<a href="registration.html">
<button id="registerBtn" data-key="register">Register</button>
</a>

</div>

</div>

<div class="section">

<h2 id="explore" data-key="explore">Explore Recipes</h2>

<div class="cards">

<div class="card">
<i class="fa-solid fa-bowl-food"></i>
<h3 id="sabji" data-key="sabji">Sabji</h3>
<button data-key="explore">View</button>
</div>

<div class="card">
<i class="fa-solid fa-bread-slice"></i>
<h3 id="roti" data-key="roti">Roti</h3>
<button data-key="explore">View</button>
</div>

<div class="card">
<i class="fa-solid fa-cake-candles"></i>
<h3 id="sweet" data-key="sweet">Sweet Dish</h3>
<button data-key="explore">View</button>
</div>

<div class="card">
<i class="fa-solid fa-clock"></i>
<h3 id="quick" data-key="quick">Quick Recipes</h3>
<button data-key="explore">View</button>
</div>

</div>

</div>

<script src="language.js"></script>
<script>
    fetch('/api/session').then(res => res.json()).then(data => {
        if(data.loggedIn) {
            let authButtons = document.querySelector('.auth-buttons');
            authButtons.innerHTML = `<button onclick="handleLogout()">Logout</button> <span style="margin-left:15px; font-weight:bold; color:white;">Hi, ${data.name}</span>`;
        }
    });

    function handleLogout() {
      fetch('/api/logout', {method: 'POST'}).then(() => {
        window.location.reload();
      });
    }

    document.getElementById("todayBtn").onclick = () => window.location.href="weeklyplan.html";
    document.querySelector("nav ul").children[1].onclick = () => window.location.href="weeklyplan.html";
</script>

</body>
</html>
