<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Cooking Plan</title>
  <link rel="stylesheet" href="./weekly_style.css">
</head>
<body>

  <!-- Top Navigation -->
  <div style="display: flex; justify-content: center; padding: 10px 30px; background: rgba(255,255,255,0.8); border-radius: 10px; margin-bottom: 20px;">
    <h2><i class="fa-solid fa-utensils"></i> Cooking Helper</h2>
  </div>

  <header>
    <h1 class="page-title">Weekly Cooking Plan</h1>
  </header>

  <main>
    <form id="timetable-form" class="controls-container">
      <div class="control-group">
        <label for="food-type">Cuisine:</label>
        <select id="food-type">
          <option value="indian">Indian</option>
          <option value="chinese">Chinese</option>
          <option value="continental">Continental</option>
          <option value="south indian">South Indian</option>
        </select>
      </div>

      <div class="control-group">
        <label for="diet-type">Diet:</label>
        <select id="diet-type">
          <option value="veg">Veg</option>
          <option value="non-veg">Non-Veg</option>
        </select>
      </div>

      <div class="control-group">
        <label>Meals:</label>
        <input type="checkbox" id="meal-breakfast" checked> <label for="meal-breakfast">Breakfast</label>
        <input type="checkbox" id="meal-lunch" checked> <label for="meal-lunch">Lunch</label>
        <input type="checkbox" id="meal-dinner" checked> <label for="meal-dinner">Dinner</label>
      </div>

      <button type="submit" class="btn-generate">Generate Plan</button>
    </form>

    <section class="timetable-wrapper">
      <table class="weekly-table" id="timetable">
        <thead>
          <tr id="table-head-row">
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </section>
  </main>

  <!-- RECIPE DETAILS MODAL -->
  <div class="modal-overlay" id="recipe-modal">
    <div class="modal-content">
        <button class="btn-close" aria-label="Close modal">✖</button>
        <div class="modal-header">
            <h2 class="modal-title" id="modal-title">Recipe Name</h2>
            <p class="modal-servings" id="modal-servings">Serves: 4 people</p>
        </div>
        <div class="modal-body">
            <div class="ingredients-section">
                <h3>Ingredients</h3>
                <img src="" id="modal-image" class="ingredients-image" alt="Recipe Preview">
                <ul class="ingredients-list" id="modal-ingredients-list"></ul>
            </div>
            <div class="steps-section">
                <h3>Steps to Prepare</h3>
                <ol class="steps-list" id="modal-steps-list"></ol>
                
                <!-- Video Section -->
                <button id="btn-show-video" class="btn-generate" style="margin-top:20px; width:100%;">Click to Watch Recipe Video</button>
                <div id="modal-video-container" style="display:none; margin-top:15px;"></div>
            </div>
        </div>
    </div>
  </div>

  <script src="./weekly_script.js"></script>
</body>
</html>
